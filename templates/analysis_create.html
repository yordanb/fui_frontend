{% extends "base.html" %}
{% block title %}New Analysis{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <a href="/fui/{{ fui_id }}" class="inline-flex items-center gap-1 text-sm font-medium text-gray-500 hover:text-gray-700 mb-4">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
        Back
    </a>
    <div class="card p-6">
        <div class="flex items-center gap-3 mb-6">
            <div class="w-10 h-10 bg-gradient-to-br from-yellow-500 to-orange-500 rounded-2xl flex items-center justify-center shadow-md shadow-yellow-200 shrink-0">
                <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
            </div>
            <div>
                <h1 class="text-lg font-bold text-gray-900">New Analysis</h1>
                <p class="text-xs text-gray-500">Add analysis to this FUI</p>
            </div>
        </div>
        <form method="POST" action="/fui/{{ fui_id }}/analysis/create" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Type</label>
                <input type="text" name="analysis_type" class="input-field" placeholder="e.g. RCA, FMEA">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Problem Description <span class="text-red-500">*</span></label>
                <textarea name="problem_description" required rows="3" class="input-field"></textarea>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Root Cause</label>
                <textarea name="root_cause" rows="2" class="input-field"></textarea>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Impact Analysis</label>
                <textarea name="impact_analysis" rows="2" class="input-field"></textarea>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Corrective Action</label>
                <textarea name="corrective_action" rows="2" class="input-field"></textarea>
            </div>
            <button type="submit" class="btn-primary w-full justify-center">Save</button>
        </form>
    </div>
</div>
{% endblock %}
