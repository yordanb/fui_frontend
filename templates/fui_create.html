{% extends "base.html" %}
{% block title %}Create FUI{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto">
    <a href="/fui" class="inline-flex items-center gap-1 text-sm font-medium text-gray-500 hover:text-gray-700 mb-4">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
        Back
    </a>
    <div class="card p-6">
        <div class="flex items-center gap-3 mb-6">
            <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-blue-600 rounded-2xl flex items-center justify-center shadow-md shadow-blue-200 shrink-0">
                <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
            </div>
            <div>
                <h1 class="text-lg font-bold text-gray-900">New FUI</h1>
                <p class="text-xs text-gray-500">Create a new FUI record</p>
            </div>
        </div>
        <form method="POST" action="/fui/create" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Unit Number <span class="text-red-500">*</span></label>
                <input type="text" name="unit_number" required class="input-field" placeholder="e.g. UNIT-001">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Priority</label>
                <select name="priority_level" class="input-field">
                    <option value="LOW">Low</option>
                    <option value="MEDIUM" selected>Medium</option>
                    <option value="HIGH">High</option>
                    <option value="CRITICAL">Critical</option>
                </select>
            </div>
            <button type="submit" class="btn-primary w-full justify-center">Create FUI</button>
        </form>
    </div>
</div>
{% endblock %}
