{% extends "base.html" %}
{% block title %}Login - FUI Management{% endblock %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4">
    <div class="card p-8 w-full max-w-sm">
        <div class="text-center mb-8">
            <div class="mx-auto w-14 h-14 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-2xl flex items-center justify-center mb-4 shadow-lg shadow-blue-200">
                <svg class="w-7 h-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
            </div>
            <h1 class="text-xl font-bold text-gray-900">FUI Management</h1>
            <p class="text-gray-500 text-sm mt-1">Sign in to continue</p>
        </div>
        <form method="POST" action="/login" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" name="username" required class="input-field" placeholder="Username">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" name="password" required class="input-field" placeholder="Password">
            </div>
            <button type="submit" class="btn-primary w-full justify-center">Sign in</button>
        </form>
    </div>
</div>
{% endblock %}
